<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Calculation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        .content {
            text-align: center;
        }
        .content h1 {
            font-size: 36px;
            color: #333;
        }
        .content p {
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Brick Calculation</h1>
        <p>How many bricks in a 60m<sup>2</sup> unit?</p>
        <p>Assuming standard brick size of 0.2m x 0.1m:</p>
        <p>Total bricks = 60m<sup>2</sup> / (0.2m x 0.1m) = 3000 bricks</p>
    </div>
</body>
</html>
