<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects with Contract Signed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .project-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .project-container h1 {
            margin: 0 0 20px;
            font-size: 24px;
            text-align: center;
        }
        .project-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .project-list li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .project-list li:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="project-container">
        <h1>Projects with Contract Signed</h1>
        <ul class="project-list">
            <li>Project A</li>
            <li>Project B</li>
            <li>Project C</li>
            <li>Project D</li>
        </ul>
    </div>
</body>
</html>
